agent:
  id: echo_agent
  version: "1.0.0"
  description: "Echo agent for testing"
  api_key: ${ECHO_AGENT_API_KEY:-echo_key_123}

capabilities:
  - name: echo.send
    description: "Send a message to be echoed back"
    input_schema:
      type: object
      properties:
        message:
          type: string
    output_schema:
      type: object
      properties:
        echo:
          type: object
        received_at:
          type: string
