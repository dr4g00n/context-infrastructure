hub:
  mqtt:
    host: "0.0.0.0"
    port: 1883
    ws_port: 8083
    max_connections: 10000

  auth:
    type: token
    tokens_file: ./tokens.json

  queue:
    ttl_seconds: 300
    max_size_per_agent: 1000
    cleanup_interval: 60

  heartbeat:
    interval_seconds: 30
    timeout_seconds: 60
    check_interval: 10

  logging:
    level: INFO
